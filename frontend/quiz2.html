<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Coding Quiz</title>
    <link rel="stylesheet" href="css.css">

    <script type="text/javascript" src="/eel.js"></script>
</head>
<body>

    <h1>Coding Quiz</h1>

    

    <div class="meta">
        <span id="round-lbl">Loading...</span>
        <span id="score-lbl">Score: 0</span>
    </div>

    <!-- quiz question appears here -->
    <div id="quiz-area"></div>

    <!-- results screen (hidden until end) -->
    <div id="results-area" style="display:none"></div>

    
    
    <script>
        var TOTAL_ROUNDS = 8;
        var currentRound  = 0;
        var score         = 0;
        var currentIndex  = null;
        var hasAnswered   = false;

        // use setTimeout to give eel time to finish its
        // websocket handshake before we call any Python functions
        window.addEventListener('load', function() {
            setTimeout(async function() {
                console.log("Calling load_questions...");
                await eel.load_questions()();
                console.log("load_questions done, loading first question...");
                await loadQuestion();
            }, 150);
        });

        async function loadQuestion() {
            hasAnswered = false;

            var q = await eel.get_next_question()();

            if (!q) {
                document.getElementById('quiz-area').innerHTML = '<p style="color:red">Could not load question - check terminal for errors.</p>';
                return;
            }

            currentIndex = q.index;

            // update labels
            
            document.getElementById('round-lbl').textContent = 'Question ' + (currentRound + 1) + ' of ' + TOTAL_ROUNDS;

            // build the question card from scratch
            var area = document.getElementById('quiz-area');
            area.innerHTML = '';

            var card = document.createElement('div');
            card.className = 'card';
            card.dataset.correct = q.correctAnswer;

            var qText = document.createElement('h3');
            qText.textContent = q.question;
            card.appendChild(qText);

            q.options.forEach(function(opt, i) {
                var lbl = document.createElement('label');
                lbl.className = 'option';
                lbl.id = 'opt-' + i;
                lbl.innerHTML = '<input type="radio" name="ans" value="' + i + '"> ' + opt;
                card.appendChild(lbl);
            });

            var resultDiv = document.createElement('div');
            resultDiv.id = 'result';
            resultDiv.className = 'result';
            card.appendChild(resultDiv);

            var submitBtn = document.createElement('button');
            submitBtn.id = 'submit-btn';
            submitBtn.className = 'submit-btn';
            submitBtn.textContent = 'Submit Answer';
            submitBtn.onclick = submitAnswer;
            card.appendChild(submitBtn);

            var nextBtn = document.createElement('button');
            nextBtn.id = 'next-btn';
            nextBtn.className = 'submit-btn';
            nextBtn.style.display = 'none';
            nextBtn.style.background = '#007bff';
            nextBtn.textContent = currentRound < TOTAL_ROUNDS - 1 ? 'Next Question →' : 'See Results →';
            nextBtn.onclick = goNext;
            card.appendChild(nextBtn);

            area.appendChild(card);
        }

        async function submitAnswer() {
            if (hasAnswered) return;

            var selected = document.querySelector('input[name="ans"]:checked');
            if (!selected) { alert('Please pick an answer!'); return; }

            hasAnswered = true;

            var chosen    = parseInt(selected.value);
            var correct   = parseInt(document.querySelector('[data-correct]').dataset.correct);
            var isCorrect = (chosen === correct);

            if (isCorrect) score++;
            document.getElementById('score-lbl').textContent = 'Score: ' + score;

            // send result + index to Python so it can update the weight
            await eel.submit_answer(isCorrect, currentIndex)();

            // show feedback
            var resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            if (isCorrect) {
                resultDiv.textContent  = '✓ Correct! Well done!';
                resultDiv.className    = 'result show correct';
            } else {
                resultDiv.textContent  = '✗ Wrong! The correct answer was: ' + document.getElementById('opt-' + correct).textContent.trim();
                resultDiv.className    = 'result show incorrect';
            }

            // disable inputs and swap buttons
            document.querySelectorAll('input[name="ans"]').forEach(function(r) { r.disabled = true; });
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display   = 'inline-block';
        }

        async function goNext() {
            currentRound++;
            if (currentRound >= TOTAL_ROUNDS) {
                await showResults();
            } else {
                await loadQuestion();
            }
        }

        async function showResults() {
            document.getElementById('quiz-area').style.display    = 'none';
            

            var allStats = await eel.get_all_stats()();
            var pct      = Math.round((score / TOTAL_ROUNDS) * 100);

            var area = document.getElementById('results-area');
            area.style.display = 'block';
            area.innerHTML =
                '<div class="card" style="text-align:center">' +
                    '<h2>Quiz Complete!</h2>' +
                    '<p style="font-size:56px;font-weight:800;color:#007bff;margin:15px 0">' + pct + '%</p>' +
                    '<p>' + score + ' correct out of ' + TOTAL_ROUNDS + '</p>' +
                '</div>' +
                '<div class="card">' +
                    '<h3>Question Breakdown</h3>' +
                    '<table style="width:100%;border-collapse:collapse;margin-top:12px" id="breakdown">' +
                        '<tr style="background:#f8f9fa"><th style="padding:8px;text-align:left">Question</th><th style="padding:8px">Attempts</th><th style="padding:8px">Correct</th><th style="padding:8px">%</th></tr>' +
                    '</table>' +
                '</div>' +
                '<button class="submit-btn" style="width:100%;background:#007bff" onclick="retryQuiz()">Try Again</button>';

            var table = document.getElementById('breakdown');
            for (var idx in allStats) {
                var s   = allStats[idx];
                var bg  = s.percentage >= 80 ? '#d4edda' : s.percentage >= 50 ? '#fff3cd' : '#f8d7da';
                var row = document.createElement('tr');
                row.style.background = bg;
                row.innerHTML =
                    '<td style="padding:8px">' + s.question + '</td>' +
                    '<td style="padding:8px;text-align:center">' + s.attempts    + '</td>' +
                    '<td style="padding:8px;text-align:center">' + s.correct     + '</td>' +
                    '<td style="padding:8px;text-align:center">' + s.percentage  + '%</td>';
                table.appendChild(row);
            }
        }

        async function retryQuiz() {
            await eel.reset_quiz()();
            location.reload();
        }
    </script>

</body>
</html>
